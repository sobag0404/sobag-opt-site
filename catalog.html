<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sobag Opt | Каталог</title>
    <meta
      name="description"
      content="Оптовый каталог Sobag Opt: текстиль с принтами, варианты изделий, подборки, праздники и корзина-заявка для бизнеса."
    />
    <link rel="canonical" href="https://sobag-shop.online/catalog.html" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Sobag Opt" />
    <meta property="og:title" content="Sobag Opt | Каталог" />
    <meta property="og:description" content="Каталог оптовых товаров Sobag: подушки, наволочки, пледы, флаги, ремувки и другие позиции с вариантами." />
    <meta property="og:url" content="https://sobag-shop.online/catalog.html" />
    <meta property="og:image" content="https://sobag-shop.online/assets/production-hero-1.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23000'/%3E%3Crect x='6' y='6' width='52' height='52' fill='%23fff'/%3E%3Ctext x='32' y='43' text-anchor='middle' font-family='Arial,sans-serif' font-size='34' font-weight='900' fill='%23000'%3ES%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css?v=20260624-customer-flow" />
  </head>
  <body class="catalog-page">
    <script>try{if(localStorage.getItem("sobag.theme.v1")==="night")document.body.classList.add("theme-night")}catch(e){}</script>
    <div data-site-topline></div>

    <div data-site-header="commerce"></div>

    <main>
      <div class="container page-back">
        <button class="ghost-button catalog-page-back" id="catalogPageBack" type="button" data-nav="/"><i data-lucide="arrow-left"></i> На главную</button>
        <strong>Каталог</strong>
      </div>
      <section class="catalog-section" id="catalog">
        <div class="container section-head catalog-section-head">
          <div>
            <h2 class="sr-only" id="catalogTitle">Каталог</h2>
          </div>
          <div class="view-tools is-hidden" id="catalogTools" role="group" aria-label="Навигация каталога"></div>
        </div>

        <div class="container catalog-home" id="catalogHome">
          <div class="catalog-home__head">
            <h3>Выберите категорию</h3>
          </div>
          <div id="categoryTiles" class="category-tiles"></div>

          <div class="catalog-home__head catalog-home__head--themes">
            <h3>Актуально</h3>
          </div>
          <div id="actualTiles" class="actual-tiles"></div>

          <div class="catalog-home__head catalog-home__head--themes">
            <h3>Подборки</h3>
          </div>
          <div id="collectionTiles" class="theme-tiles"></div>

          <div class="catalog-home__head catalog-home__head--themes">
            <h3>Праздники</h3>
          </div>
          <div id="holidayTiles" class="theme-tiles"></div>
          <section class="catalog-price-panel" aria-labelledby="catalogPriceTitle">
            <div class="catalog-price-panel__head">
              <div>
                <h3 id="catalogPriceTitle">Прайс</h3>
                <span>Категории, цены и активные акции из текущего каталога</span>
              </div>
              <a class="primary-button catalog-price-button" href="/api/price-list" target="_blank" rel="noopener" download="sobag-price-list.csv" data-price-download data-price-format="csv" aria-label="Скачать прайс CSV" title="Скачать прайс CSV для Excel">
                <i data-lucide="download"></i>
                Прайс
              </a>
            </div>
            <div class="price-list-preview" id="priceListPreview" aria-live="polite">
              <div class="price-list-preview__skeleton" aria-hidden="true"><span></span><span></span><span></span></div>
            </div>
          </section>
        </div>

        <div class="container catalog-layout is-hidden" id="catalogListing">
          <div class="catalog-listing-head">
            <button class="ghost-button catalog-listing-back" id="catalogListingBack" type="button" data-back-catalog>
              <i data-lucide="arrow-left"></i>
              В каталог
            </button>
            <div class="catalog-listing-title">
              <h2 id="catalogCompactTitle">Каталог</h2>
              <span id="productCount" aria-live="polite"></span>
            </div>
            <select id="sortSelect" aria-label="Сортировка">
              <option value="popular">Сначала популярные</option>
              <option value="priceAsc">Цена: ниже</option>
              <option value="priceDesc">Цена: выше</option>
              <option value="minQty">Минимальная партия</option>
            </select>
          </div>
          <button class="filter-toggle is-hidden" id="filterToggle" type="button" data-toggle-filters>
            <i data-lucide="sliders-horizontal"></i>
            Открыть фильтры
          </button>
          <aside class="filters" aria-label="Фильтры каталога">
            <div id="filterGroups"></div>
            <div class="filters__block">
              <h3>Скидка</h3>
              <div class="discount-meter">
                <div class="discount-meter__bar"><span id="discountProgress"></span></div>
                <p id="discountHint">Добавьте товары, чтобы открыть скидку.</p>
              </div>
            </div>
          </aside>

          <div class="catalog-main">
            <div class="active-filter-chips" id="activeFilterChips" aria-live="polite"></div>
            <section class="catalog-seo-copy is-hidden" id="catalogSeoCopy" aria-live="polite"></section>
            <div id="productGrid" class="product-grid"></div>
            <div class="catalog-load-more" id="catalogLoadMore"></div>
            <section class="catalog-recent is-hidden" id="recentProductsSection" aria-label="Недавно смотрели">
              <div class="catalog-recent__head">
                <h3>Недавно смотрели</h3>
                <span>Быстрый возврат к открытым позициям</span>
              </div>
              <div class="mini-product-row" id="recentProducts"></div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script defer src="components/site-shell.js?v=20260625-sw-cache-v2"></script>
    <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script defer src="components/app-utils.js?v=20260615-modular-utils"></script>
  <script defer src="components/app-data.js?v=20260624-public-cache-v3"></script>
  <script defer src="components/app-content-utils.js?v=20260624-public-cache-v3"></script>
  <script defer src="components/app-product-utils.js?v=20260624-product-image-sizes"></script>
  <script defer src="components/app-xlsx.js?v=20260625-export-polish"></script>
<script defer src="components/app-account.js?v=20260623-icon-refresh"></script>
  <script defer src="components/app-admin-loader.js?v=20260626-admin-lazy"></script>

    <script defer src="app.js?v=20260624-product-image-sizes"></script>
  </body>
</html>
