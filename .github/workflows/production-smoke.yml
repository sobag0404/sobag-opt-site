name: production-smoke

on:
  workflow_run:
    workflows: ["vps-deploy"]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Production VPS base URL"
        required: false
        default: "https://sobag-shop.online"

permissions:
  contents: read

concurrency:
  group: production-smoke-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  smoke:
    if: >-
      ${{
          (
            github.event_name == 'workflow_dispatch' &&
            github.ref_name == 'main'
          ) ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate production smoke target
        env:
          SOBAG_PRODUCTION_BASE_URL: ${{ github.event.inputs.base_url || vars.PRODUCTION_BASE_URL || 'https://sobag-shop.online' }}
        run: |
          case "$SOBAG_PRODUCTION_BASE_URL" in
            https://sobag-shop.online|https://sobag-shop.online/*)
              ;;
            *)
              echo "Production smoke base URL must stay on sobag-shop.online"
              exit 1
              ;;
          esac
      - name: Run read-only production smoke
        env:
          SOBAG_PRODUCTION_BASE_URL: ${{ github.event.inputs.base_url || vars.PRODUCTION_BASE_URL || 'https://sobag-shop.online' }}
        run: node tools/production-smoke.mjs --timeout 15000 --retries 6 --retry-delay 20000
      - name: Run read-only canonical URL smoke
        env:
          SOBAG_PRODUCTION_BASE_URL: ${{ github.event.inputs.base_url || vars.PRODUCTION_BASE_URL || 'https://sobag-shop.online' }}
        run: node tools/canonical-url-smoke.mjs --base-url "$SOBAG_PRODUCTION_BASE_URL" --timeout 15000
      - name: Run read-only production performance smoke
        env:
          SOBAG_PRODUCTION_BASE_URL: ${{ github.event.inputs.base_url || vars.PRODUCTION_BASE_URL || 'https://sobag-shop.online' }}
        run: |
          set +e
          output="$(node tools/production-performance-smoke.mjs --timeout 15000 --max-ms 5000 --catalog-api-max-ms 3000 --catalog-first-load-max-ms 4500 2>&1)"
          status="$?"
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            reason="$(printf '%s\n' "$output" | tail -n 8 | tr '\n' ' ' | sed 's/[^[:print:]]//g' | cut -c1-900)"
            echo "::error title=production-performance-smoke failed::$reason"
            exit "$status"
          fi
      - name: Run read-only production storage readiness
        env:
          SOBAG_PRODUCTION_BASE_URL: ${{ github.event.inputs.base_url || vars.PRODUCTION_BASE_URL || 'https://sobag-shop.online' }}
        run: node tools/production-storage-readiness.mjs --timeout 15000
      - name: Run read-only public cache warmup verification
        env:
          SOBAG_PRODUCTION_BASE_URL: ${{ github.event.inputs.base_url || vars.PRODUCTION_BASE_URL || 'https://sobag-shop.online' }}
        run: node tools/cache-warmup-smoke.mjs --timeout 15000 --max-ms 5000
