name: vps-deploy

on:
  workflow_run:
    workflows: ["autofix-check"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vps-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate release files
        run: |
          npm ci
          npm run audit:vps-release

      - name: Configure SSH
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Activate release
        run: |
          ssh -i ~/.ssh/vps_deploy_key "$VPS_USER@$VPS_HOST" \
            "DEPLOY_SHA='$DEPLOY_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          app_dir="/opt/sobag-opt"
          repo_dir="$app_dir/repo"
          release="$(date -u +%Y%m%dT%H%M%SZ)-${DEPLOY_SHA:0:7}"
          release_dir="$app_dir/releases/$release"

          sudo install -d -o "$USER" -g "$USER" "$app_dir/releases" "$app_dir/shared" "$repo_dir" /var/lib/sobag-opt/store /var/backups/sobag-opt

          export GIT_SSH_COMMAND="ssh -i /home/$USER/.ssh/github_repo_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          if [ ! -d "$repo_dir/.git" ]; then
            rm -rf "$repo_dir"
            git clone --no-checkout git@github.com:sobag0404/sobag-opt-site.git "$repo_dir"
          fi

          cd "$repo_dir"
          git fetch --prune origin main
          git cat-file -e "$DEPLOY_SHA^{commit}"

          mkdir -p "$release_dir"
          git archive --format=tar "$DEPLOY_SHA" | tar -x -C "$release_dir"

          cd "$release_dir"
          npm ci --omit=dev

          ln -sfn "$release_dir" "$app_dir/current"
          printf '%s\n' "$release" > "$app_dir/current-release.txt"

          if pm2 describe sobag-opt >/dev/null 2>&1; then
            pm2 restart sobag-opt --update-env
          else
            pm2 start "$app_dir/shared/start.sh" --name sobag-opt --interpreter bash
          fi

          pm2 save --force
          curl -fsS http://127.0.0.1:3000/api/health

          mapfile -t releases < <(ls -1dt "$app_dir"/releases/* 2>/dev/null || true)
          keep_current="$(readlink -f "$app_dir/current")"
          keep_previous="${releases[1]:-}"
          for old_release in "${releases[@]}"; do
            if [ "$old_release" != "$keep_current" ] && [ "$old_release" != "$keep_previous" ]; then
              rm -rf -- "$old_release"
            fi
          done
          REMOTE
