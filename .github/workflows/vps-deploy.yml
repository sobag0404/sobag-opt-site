name: vps-deploy

on:
  workflow_run:
    workflows: ["autofix-check"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vps-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Validate release files
        run: |
          npm ci
          npm run audit:vps-release

      - name: Configure SSH
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Activate release
        run: |
          ssh -i ~/.ssh/vps_deploy_key "$VPS_USER@$VPS_HOST" \
            "DEPLOY_SHA='$DEPLOY_SHA' bash -s" <<'REMOTE'
          set -euo pipefail

          app_dir="/opt/sobag-opt"
          repo_dir="$app_dir/repo"
          release="$(date -u +%Y%m%dT%H%M%SZ)-${DEPLOY_SHA:0:7}"
          release_dir="$app_dir/releases/$release"

          sudo install -d -o "$USER" -g "$USER" "$app_dir/releases" "$app_dir/shared" "$repo_dir" /var/lib/sobag-opt/store /var/backups/sobag-opt

          export GIT_SSH_COMMAND="ssh -i /home/$USER/.ssh/github_repo_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          if [ ! -d "$repo_dir/.git" ]; then
            rm -rf "$repo_dir"
            git clone --no-checkout git@github.com:sobag0404/sobag-opt-site.git "$repo_dir"
          fi

          cd "$repo_dir"
          git fetch --prune origin main
          git cat-file -e "$DEPLOY_SHA^{commit}"

          mkdir -p "$release_dir"
          git archive --format=tar "$DEPLOY_SHA" | tar -x -C "$release_dir"

          cd "$release_dir"
          npm ci --omit=dev
          rust_binary="$app_dir/shared/sobag-opt-rust"
          rust_previous="$app_dir/shared/sobag-opt-rust.previous"

          if [ -f rust-server/Cargo.toml ]; then
            if command -v cargo >/dev/null 2>&1; then
              cargo_bin="$(command -v cargo)"
            elif [ -x "$HOME/.cargo/bin/cargo" ]; then
              cargo_bin="$HOME/.cargo/bin/cargo"
            else
              echo "Rust cargo is required on VPS to build rust-server"
              exit 1
            fi
            cargo() {
              "$cargo_bin" "$@"
            }
            (
              cd rust-server
              cargo test --locked
              cargo build --release --locked
            )
          fi

          ln -sfn "$release_dir" "$app_dir/current"
          printf '%s\n' "$release" > "$app_dir/current-release.txt"

          if pm2 describe sobag-opt >/dev/null 2>&1; then
            pm2 restart sobag-opt --update-env
          else
            pm2 start "$app_dir/shared/start.sh" --name sobag-opt --interpreter bash
          fi

          pm2 save --force
          curl -fsS http://127.0.0.1:3000/api/health

          if [ -f rust-server/Cargo.toml ]; then
            if [ -x "$rust_binary" ]; then
              cp -p "$rust_binary" "$rust_previous"
            fi
            install -m 755 rust-server/target/release/sobag-opt-rust "$rust_binary"
            cat > /tmp/sobag-opt-rust.service <<'SERVICE'
          [Unit]
          Description=Sobag Opt Rust API
          After=network.target postgresql.service

          [Service]
          User=sobag
          WorkingDirectory=/opt/sobag-opt/current
          EnvironmentFile=/opt/sobag-opt/shared/.env
          Environment=SOBAG_RUST_BIND=127.0.0.1:3001
          ExecStart=/opt/sobag-opt/shared/sobag-opt-rust
          Restart=always
          RestartSec=3
          NoNewPrivileges=true
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
          SERVICE
            sudo mv /tmp/sobag-opt-rust.service /etc/systemd/system/sobag-opt-rust.service
            sudo systemctl daemon-reload
            sudo systemctl enable sobag-opt-rust
            if ! sudo systemctl restart sobag-opt-rust; then
              echo "Rust restart failed; restoring previous binary"
              if [ -x "$rust_previous" ]; then
                install -m 755 "$rust_previous" "$rust_binary"
                sudo systemctl restart sobag-opt-rust || true
              fi
              exit 1
            fi
            sleep 2
            if ! curl -fsS http://127.0.0.1:3001/api/health-rust; then
              echo "Rust health failed; restoring previous binary"
              if [ -x "$rust_previous" ]; then
                install -m 755 "$rust_previous" "$rust_binary"
                sudo systemctl restart sobag-opt-rust || true
                curl -fsS http://127.0.0.1:3001/api/health-rust || true
              fi
              exit 1
            fi
            node tools/rust-catalog-shadow-smoke.mjs --node-base http://127.0.0.1:3000 --rust-base http://127.0.0.1:3001
            node tools/rust-ssr-smoke.mjs --base http://127.0.0.1:3001
            set -a
            . "$app_dir/shared/.env"
            set +a
            node tools/rust-auth-me-shadow-smoke.mjs --rust-bin rust-server/target/release/sobag-opt-rust
            node tools/rust-orders-write-smoke.mjs --rust-bin rust-server/target/release/sobag-opt-rust
          fi

          mapfile -t releases < <(ls -1dt "$app_dir"/releases/* 2>/dev/null || true)
          keep_current="$(readlink -f "$app_dir/current")"
          keep_previous="${releases[1]:-}"
          for old_release in "${releases[@]}"; do
            if [ "$old_release" != "$keep_current" ] && [ "$old_release" != "$keep_previous" ]; then
              rm -rf -- "$old_release"
            fi
          done
          REMOTE
