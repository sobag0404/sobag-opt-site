name: rust-check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cargo-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # GitHub-owned actions are pinned to full commit SHAs; refresh intentionally during CI maintenance.
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check Rust toolchain
        run: cargo --version

      - name: Cargo metadata
        working-directory: rust-server
        run: cargo metadata --locked --format-version 1 --no-deps

      - name: Cargo fmt
        working-directory: rust-server
        run: cargo fmt --check

      - name: Cargo check
        working-directory: rust-server
        run: cargo check --locked

      - name: Cargo test
        working-directory: rust-server
        run: cargo test --locked
