# JSON-free, dependency-free YAML subset. Keep values simple: maps, lists,
# strings, booleans, and integers are supported by the local config loader.
project:
  name: "sobag-opt-site"
  default_branch: "main"

scan:
  max_text_file_kb: 1024
  max_context_files: 160
  large_file_lines: 1500
  huge_file_lines: 5000
  exclude_dirs:
    - ".git"
    - ".vercel"
    - "node_modules"
    - "rust-server/target"
    - "test-results"
    - "local-import-output"
    - "output"
    - "qa-screenshots"
    - "__pycache__"
  exclude_globs:
    - "assets/product-preview-live/**"
    - "*.zip"
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.webp"
    - "*.xlsx"
    - "*.pdf"
    - "package-lock.json"

commands:
  enabled_env: "PROJECT_READINESS_RUN_COMMANDS"
  default_enabled: true
  timeout_seconds: 180
  allow_shell_metacharacters: false
  list:
    - "python -m unittest discover -s tools/project_readiness_agent/tests -t tools"
    - "npm run check"

reports:
  directory: "reports/project-readiness"
  full: "reports/project-readiness/latest.md"
  chat: "reports/project-readiness/latest-chat.md"
  chat_limit: 3000

thresholds:
  ready: 90
  ready_with_warnings: 75
  not_ready: 25

weights:
  Architecture: 13
  Code Quality: 14
  Security: 18
  Tests: 12
  Documentation: 10
  CI/CD: 11
  Product Readiness: 14
  Prompt Engineering: 8
